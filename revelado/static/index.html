<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Revelado — asistente para Lightroom</title>
  <link rel="stylesheet" href="/static/style.css?v=7">
</head>
<body>
  <header>
    <h1>Revelado</h1>
    <p id="subtitle">Selecciona la carpeta de la sesión</p>
  </header>

  <section id="browser">
    <div id="lrcat"></div>
    <div id="crumb"></div>
    <ul id="dirs"></ul>
  </section>

  <section id="gallery" hidden>
    <div class="toolbar">
      <button id="back">← Carpetas</button>
      <button id="select-all">Seleccionar todas</button>
      <label><input type="checkbox" id="overwrite"> Sobrescribir XMP existentes</label>
      <label><input type="checkbox" id="harmonize" checked> Armonizar sesión (mismo look por escena)</label>
      <button id="process" class="primary" disabled>Procesar seleccionadas</button>
    </div>
    <div id="session-opts">
      <div class="opt-row">
        <span class="opt-label">🌙 Más oscuras</span>
        <input type="range" id="bias-expo" min="-1" max="1" step="0.1" value="0">
        <span class="opt-label">Más claras ☀️</span>
        <span class="opt-val" id="bias-expo-val">0.0 EV</span>
      </div>
      <div class="opt-row">
        <span class="opt-label">❄️ Más frías</span>
        <input type="range" id="bias-temp" min="-800" max="800" step="50" value="0">
        <span class="opt-label">Más cálidas 🔥</span>
        <span class="opt-val" id="bias-temp-val">0 K</span>
      </div>
      <textarea id="session-prompt" rows="3"
        placeholder="Indicaciones para la IA en esta sesión (opcional): escribe con tus palabras cómo quieres las fotos…"></textarea>
      <div id="chips"><button type="button" id="clear-prompt" class="chip-clear">✕ Borrar texto</button></div>
    </div>
    <div id="grid"></div>
  </section>

  <section id="progress" hidden>
    <h2 id="progress-title">Procesando…</h2>
    <div class="bar"><div id="bar-fill"></div></div>
    <p id="progress-text"></p>
    <ul id="log"></ul>
    <div class="toolbar" id="done-actions" hidden>
      <button id="show-review" class="primary">Revisar resultados</button>
      <button id="restart">Procesar otra carpeta</button>
    </div>
  </section>

  <section id="review" hidden>
    <div class="toolbar">
      <button id="review-back">← Progreso</button>
      <p>Antes / después (simulación aproximada). Descarta las que no te convenzan antes de ir a Lightroom.</p>
    </div>
    <div id="review-grid"></div>
  </section>

  <script src="/static/app.js?v=7"></script>
</body>
</html>
